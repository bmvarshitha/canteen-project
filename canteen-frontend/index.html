<!DOCTYPE html>
<html lang="en">
<head>
<title>Token & Tray — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-bg-overlay">
    <div class="login-box">

        <div class="brand">
            <span class="brand-icon">🍽️</span>
            <h1>Token & Tray</h1>
            <p class="tagline">Skip the queue. Eat smart.</p>
        </div>

        <!-- TABS -->
        <div class="tab-row">
            <button class="tab-btn active" id="userTab" onclick="switchTab('user')">👤 Student</button>
            <button class="tab-btn" id="adminTab" onclick="switchTab('admin')">🛡️ Admin</button>
        </div>

        <!-- USER FIELDS -->
        <div id="userFields">
            <input type="text" id="name" placeholder="Your Name" />
            <input type="tel" id="phone" placeholder="Phone Number (10 digits)" maxlength="10" />
            <p class="hint">New user? We'll create your account automatically!</p>
        </div>

        <!-- ADMIN FIELDS -->
        <div id="adminFields" style="display:none">
            <input type="email" id="email" placeholder="Admin Email" />
            <input type="password" id="password" placeholder="Password" />
            <p class="hint">Admin: admin@canteen.com / admin123</p>
        </div>

        <button class="login-btn" onclick="login()">Get Started →</button>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>

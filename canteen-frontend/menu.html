<!DOCTYPE html>
<html lang="en">
<head>
<title>Token & Tray — Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="menu-body">

<div class="navbar">
    <div class="navbar-left">🍽️ Token & Tray</div>
    <div class="navbar-right">
        <span id="userName"></span>
        <button class="nav-btn" onclick="window.location.href='history.html'">📜 History</button>
        <button class="nav-btn logout" onclick="logout()">Logout</button>
    </div>
</div>

<div class="menu-container">

    <div class="menu-header">
        <h2>Today's Menu</h2>
        <input type="text" id="search" placeholder="🔍 Search food..." onkeyup="searchFood()" />
    </div>

    <div id="menuList" class="menu-grid">
        <p style="color:white">Loading menu...</p>
    </div>

    <div class="slot-bar">
        <label>🕐 Pick up slot:</label>
        <select id="slot">
            <option>08:00 - 08:30</option>
            <option>08:30 - 09:00</option>
            <option>09:00 - 09:30</option>
            <option>09:30 - 10:00</option>
            <option>10:00 - 10:30</option>
            <option>10:30 - 11:00</option>
            <option>11:00 - 11:30</option>
            <option>11:30 - 12:00</option>
            <option>12:00 - 12:30</option>
            <option>12:30 - 01:00</option>
            <option>01:00 - 01:30</option>
            <option>01:30 - 02:00</option>
            <option>02:00 - 02:30</option>
            <option>02:30 - 03:00</option>
            <option>03:00 - 03:30</option>
            <option>03:30 - 04:00</option>
        </select>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
